services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    environment:
      PERFORMATION_AGENT_TIMEOUT_SECONDS: "${PERFORMATION_AGENT_TIMEOUT_SECONDS:-30}"
      PERFORMATION_CACHE_ENABLED: "${PERFORMATION_CACHE_ENABLED:-true}"
      PERFORMATION_CACHE_MAX_ITEMS: "${PERFORMATION_CACHE_MAX_ITEMS:-256}"
      PERFORMATION_CACHE_TTL_SECONDS: "${PERFORMATION_CACHE_TTL_SECONDS:-}"
      PERFORMATION_CORS_ORIGINS: "${PERFORMATION_CORS_ORIGINS:-http://localhost:7860,http://127.0.0.1:7860}"
      PERFORMATION_KOPIS_CACHE_TTL_SECONDS: "${PERFORMATION_KOPIS_CACHE_TTL_SECONDS:-}"
      PERFORMATION_KOPIS_LOOKAHEAD_DAYS: "${PERFORMATION_KOPIS_LOOKAHEAD_DAYS:-120}"
      PERFORMATION_KOPIS_ROWS: "${PERFORMATION_KOPIS_ROWS:-10}"
      PERFORMATION_KOPIS_TIMEOUT_SECONDS: "${PERFORMATION_KOPIS_TIMEOUT_SECONDS:-10}"
      PERFORMATION_LLM_CACHE_TTL_SECONDS: "${PERFORMATION_LLM_CACHE_TTL_SECONDS:-}"
      PERFORMATION_LLM_MODEL: "${PERFORMATION_LLM_MODEL:-gemini-2.5-flash-lite}"
      PERFORMATION_LLM_PROVIDER: "${PERFORMATION_LLM_PROVIDER:-gemini}"
      PERFORMATION_LLM_TIMEOUT_SECONDS: "${PERFORMATION_LLM_TIMEOUT_SECONDS:-20}"
      PERFORMATION_LOG_LEVEL: "${PERFORMATION_LOG_LEVEL:-INFO}"
      PERFORMATION_SEARCH_CACHE_TTL_SECONDS: "${PERFORMATION_SEARCH_CACHE_TTL_SECONDS:-}"
      PERFORMATION_SEARCH_MAX_RESULTS: "${PERFORMATION_SEARCH_MAX_RESULTS:-3}"
      PERFORMATION_SEARCH_PROVIDER: "${PERFORMATION_SEARCH_PROVIDER:-}"
      PERFORMATION_SEARCH_TIMEOUT_SECONDS: "${PERFORMATION_SEARCH_TIMEOUT_SECONDS:-10}"
      BRAVE_SEARCH_API_KEY: "${BRAVE_SEARCH_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      KOPIS_API_KEY: "${KOPIS_API_KEY:-}"
      TAVILY_API_KEY: "${TAVILY_API_KEY:-}"
    ports:
      - "${PERFORMATION_BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    environment:
      PERFORMATION_API_URL: "${PERFORMATION_FRONTEND_API_URL:-http://backend:8000}"
      GRADIO_SERVER_NAME: "${GRADIO_SERVER_NAME:-0.0.0.0}"
      GRADIO_SERVER_PORT: "${GRADIO_SERVER_PORT:-7860}"
    ports:
      - "${PERFORMATION_FRONTEND_PORT:-7860}:${GRADIO_SERVER_PORT:-7860}"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; port=os.getenv('GRADIO_SERVER_PORT', '7860'); urllib.request.urlopen(f'http://127.0.0.1:{port}/', timeout=3).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
