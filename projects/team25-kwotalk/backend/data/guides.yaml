# 사건유형(case_type) 별 대응 단계.
# 키: app.taxonomy.CaseType. 값: list[str] (각 단계 한 줄).
# 추가·수정 시 변호사 검수 필요.

DRUNK_DRIVING:
  - "호흡측정에 응하고 결과를 확인. 불복 시 채혈측정 요구 가능 (측정 거부는 가중처벌)."
  - "면허 행정처분 확인 — 0.03~0.08% 면허정지, 0.08% 이상 면허취소. 이의신청 가능."
  - "검찰 송치 → 약식기소 또는 정식재판. 단순/사고 동반/재범에 따라 양형 차이."
  - "양형 자료 준비 — 반성문, 음주운전 방지장치 부착 동의, 알코올 치료 이수 증명 등."
  - "변호인 선임 검토 (윤창호법 적용 시 가중처벌)."

HIT_AND_RUN:
  - "가능한 빨리 경찰서·변호인과 자수 절차 협의 (자수는 양형에 유리)."
  - "피해자 구호·합의서 작성 (가중처벌 회피 핵심)."
  - "특정범죄 가중처벌법 제5조의3 적용 여부 검토."
  - "도주 의사 부재 등 항변 사유 검토."
  - "사망·중상 도주는 무기 또는 5년 이상 징역 — 즉시 변호인 선임."

PEDESTRIAN_ACCIDENT:
  - "응급조치 — 부상자 구호 (의무, 위반 시 도주 인정 가능). 112·119 신고."
  - "경찰 출동·교통사고 사실확인원 발급 요청."
  - "12대 중과실 해당 여부 확인 (신호위반·중앙선·과속·횡단보도 등)."
  - "종합보험 가입 여부, 피해자 합의 여부 확인 — 형사 처벌 분기."
  - "치료비·일실수익·위자료 산정 후 형사합의서 작성 (양형 반영)."
  - "보험금 청구 + 민사 손해배상 소송, 운전면허 행정처분 대응."

WRONG_WAY_DRIVING:
  - "사고 발생 시 즉시 정차하고 부상자 구호·신고."
  - "도로교통법 제13조 위반 — 면허 벌점 30점, 인사사고 결합 시 형사 처벌."
  - "고속도로 역주행은 가중. 블랙박스·CCTV 확보."
  - "12대 중과실 중 '중앙선 침범' 해당 시 종합보험 무관 형사 처벌."
  - "변호인 상담 권장."

RECKLESS_DRIVING:
  - "도로교통법 제46조의3 — 9개 위반행위 둘 이상 또는 반복 시 난폭운전."
  - "면허정지·취소 행정처분 + 1년 이하 징역 또는 500만원 이하 벌금."
  - "보복운전(형법상 특수폭행)은 별도 형사 처벌 — 더 무거움."
  - "블랙박스·녹취·차량 번호 등 증거 확보."
  - "피해 발생 시 형사 고소 + 민사 손해배상 검토."
